name: Deploy to Dev (Mac)

on:
  push:
    branches: [dev]

jobs:
  deploy:
    runs-on: [self-hosted, macOS, ARM64]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Pull latest images
        run: |
          docker pull ghcr.io/angelamadjar/cookiejar-api:dev || true
          docker pull ghcr.io/angelamadjar/cookiejar-nginx:dev || true

      - name: Restart dev stack
        run: |
          export APP_VERSION=dev-${GITHUB_SHA::8}
          docker compose -f deployment/homework-5/dev/docker-compose.dev.yml down -v --remove-orphans
          docker compose -f deployment/homework-5/dev/docker-compose.dev.yml up -d

      - name: Verify deployment
        run: |
          sleep 10
          curl -fsS http://localhost:8088/health
          curl -fsS http://localhost:8088/version