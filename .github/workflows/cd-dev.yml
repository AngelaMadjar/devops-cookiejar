name: Deploy to Dev (Mac)

on:
  workflow_run:
    workflows: ["Homework 5 CI"]
    types: [completed]
    branches: [dev]

jobs:
  deploy:
    if: |
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'dev'
    runs-on: [self-hosted, macOS, ARM64]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set image tag
        run: |
          echo "IMAGE_TAG=${{ github.event.workflow_run.head_sha }}" >> $GITHUB_ENV
          echo "APP_VERSION=dev-$(echo "${{ github.event.workflow_run.head_sha }}" | cut -c1-8)" >> $GITHUB_ENV

      - name: Pull latest images
        env:
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
        run: |
          docker pull ghcr.io/angelamadjar/cookiejar-api:${IMAGE_TAG}
          docker pull ghcr.io/angelamadjar/cookiejar-nginx:${IMAGE_TAG}

      # - name: Restart dev stack
      #   run: |
      #     export APP_VERSION=dev-$(echo "${{ github.event.workflow_run.head_sha }}" | cut -c1-8)
      #     docker compose -f deployment/homework-5/dev/docker-compose.dev.yml down -v --remove-orphans
      #     docker compose -f deployment/homework-5/dev/docker-compose.dev.yml up -d

      - name: Redeploy dev app stack
        env:
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
          APP_VERSION: ${{ env.APP_VERSION }}
        run: |
          COMPOSE="docker compose -f deployment/homework-5/dev/docker-compose.dev.yml"

          $COMPOSE pull app nginx migrate
          $COMPOSE up -d db
          $COMPOSE up migrate
          $COMPOSE up -d --force-recreate app nginx

      - name: Verify deployment
        run: |
          sleep 10
          curl -fsS http://localhost:8088/health
          curl -fsS http://localhost:8088/version

