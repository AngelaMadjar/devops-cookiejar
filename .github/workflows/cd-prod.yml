name: Deploy to Prod

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Commit SHA image tag to deploy"
        required: true

jobs:
  deploy:
    environment: production
    runs-on: [self-hosted, macOS, ARM64]

    env:
      IMAGE_TAG: ${{ inputs.image_tag }}
      APP_VERSION: prod-${{ inputs.image_tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.image_tag }}

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Pull images
        run: |
          docker pull ghcr.io/angelamadjar/cookiejar-api:${IMAGE_TAG}
          docker pull ghcr.io/angelamadjar/cookiejar-nginx:${IMAGE_TAG}

      - name: Redeploy prod stack
        run: |
          COMPOSE="docker compose -f deployment/homework-5/prod/docker-compose.prod.yml"
          $COMPOSE pull app nginx migrate
          $COMPOSE up -d db
          $COMPOSE up migrate
          $COMPOSE up -d --force-recreate app nginx

      - name: Verify deployment
        run: |
          sleep 10
          curl -fsS http://localhost:8089/health
          curl -fsS http://localhost:8089/version


