name: Deploy to Prod (Mac)

on:
  push:
    branches: [main]

jobs:
  deploy:
    if: github.event.pull_request.merged == true
    environment: production
    runs-on: [self-hosted, macOS, ARM64]

    env:
      IMAGE_TAG: ${{ github.event.workflow_run.head_sha }}
      APP_VERSION: prod-${{ github.event.workflow_run.head_sha }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Pull latest prod images
        run: |
          docker pull ghcr.io/angelamadjar/cookiejar-api:${IMAGE_TAG}
          docker pull ghcr.io/angelamadjar/cookiejar-nginx:${IMAGE_TAG}

      # - name: Redeploy prod app stack
      #   run: |
      #     export APP_VERSION=prod-${{ github.event.workflow_run.head_sha }}
      #     docker compose -f deployment/homework-5/prod/docker-compose.prod.yml down -v --remove-orphans
      #     docker compose -f deployment/homework-5/prod/docker-compose.prod.yml up -d

      - name: Redeploy prod app stack
        run: |
          COMPOSE="docker compose -f deployment/homework-5/prod/docker-compose.prod.yml"

          $COMPOSE pull app nginx migrate
          $COMPOSE up -d db
          $COMPOSE up migrate
          $COMPOSE up -d --force-recreate app nginx

      - name: Verify deployment
        run: |
          sleep 10
          curl -fsS http://localhost:8089/health
          curl -fsS http://localhost:8089/version
