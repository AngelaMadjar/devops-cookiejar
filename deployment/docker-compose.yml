services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    networks:
      - cookiejar-net

  app:
    image: cookiejar-api:${IMAGE_TAG}
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@db:5432/postgres
    depends_on:
      - db
    ports:
      - "8080:8080"
    networks:
      - cookiejar-net

networks:
  cookiejar-net:
